worker_processes auto;

events {
    worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;
    root /var/www/html;

    upstream gateway {
        server gateway:4000;
    }

    server {
        listen 80;
        server_name e3r3p8.1337.ma;

        location /api/v1 {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
        }

        location /auth {
            internal;
            proxy_pass http://gateway/api/v1/auth/check;
        }

        location /ws/v1/chat {
            # auth_request /auth;            
            # auth_request_set $auth_user $upstream_http_x_auth_user;
            # add_header X-Auth-User $auth_user always;

            proxy_pass http://chat:3003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;

            proxy_read_timeout 24h;
        }

        location /ws/v1/game {
            auth_request /auth;            
            auth_request_set $auth_user $upstream_http_x_auth_user;
            add_header X-Auth-User $auth_user always;

            proxy_pass http://game:3004;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;

            proxy_read_timeout 24h;
        }

        location /ws/v1/notification {
            # auth_request /auth;
            # auth_request_set $auth_user $upstream_http_x_auth_user;
            # add_header X-Auth-User $auth_user always;

            proxy_pass http://notification:3005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;

            proxy_read_timeout 24h;
        }

        location /ui {
            alias /var/www/html/ui;
            try_files $uri $uri/ /ui/index.html;
        }
    }
}
