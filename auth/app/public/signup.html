<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <script src="./js/index.js"></script>
  <title>Modern Registration Form</title>
</head>
<body>
  <form class="form-container" action="/submit" method="POST" enctype="multipart/form-data">
    <h2>Create Account</h2>

    <div class="form-group">
      <label for="username">Username*</label>
      <input type="text" id="username" name="username" required>
    </div>

    <div class="form-group">
      <label for="email">Email*</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label for="pass">Password*</label>
      <input type="password" id="pass" name="pass" required>
    </div>

    <div class="form-group">
      <label for="bio">Bio</label>
      <textarea id="bio" name="bio" rows="3" placeholder="Tell us something about yourself..."></textarea>
    </div>

    <div class="form-group">
      <label for="avatar">Avatar</label>
      <input type="file" id="avatar" name="avatar" accept="image/*">
    </div>
    <button type="signup">Register</button>

    <div class="token_signup"></div>
  </form>
</body>
</html>
