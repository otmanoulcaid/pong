<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Your Password</title>
  </head>
  <body>
    <div style="border-radius: 20px; margin: 20px auto; padding: 24px 30px; max-width: 400px; background-color: #141a2a">
      <img src="https://media.discordapp.net/attachments/1358024892552843514/1392072884062785556/logo.png?ex=686e3467&is=686ce2e7&hm=9281a10e0cd4cf8bb499cb1f7897af9c40f4e113717f37294dcbc58027430bda&=&format=webp&quality=lossless" alt="logo" style="width: 100%; height: auto" />
      
      <div style="color: #00bba7; text-align: center; font-weight: bold; font-family: Arial, Helvetica, sans-serif; font-size: 22px; margin: 20px 0px">
        Reset Your Password
      </div>

      <div style="color: white; text-align: center; font-family: Arial, Helvetica, sans-serif; font-size: 14px; margin-bottom: 24px;">
        We received a request to reset your password. Click the button below to proceed. This link will expire in 15 minutes.
      </div>

      <div style="text-align: center; margin: 24px 0;">
        <a href="OTT" style="display: inline-block; background-color: #00bba7; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 16px; padding: 12px 20px; border-radius: 8px; font-family: Arial, Helvetica, sans-serif;">
          Reset Password
        </a>
      </div>

      <div style="color: #90a1b9; text-align: center; font-family: Arial, Helvetica, sans-serif; font-size: 12px; margin-top: 12px;">
        If you didn’t request a password reset, you can ignore this email.
      </div>
    </div>
  </body>
</html>
